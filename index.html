<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Aquarium 3D de la bouche</title>
  <!-- MediaPipe FaceMesh en UMD (global window.FaceMesh) — NON bundlé par Vite, assets via CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
  <style>
    html, body { margin: 0; height: 100%; background: #02141f; overflow: hidden; font-family: sans-serif; touch-action: none; }
    #wrap { position: fixed; inset: 0; }
    #vid, #root, #hud { position: absolute; inset: 0; width: 100%; height: 100%; }
    #root > canvas { display: block; width: 100% !important; height: 100% !important; }
    #vid { object-fit: cover; transform: scaleX(-1); opacity: .22; }
    #root { cursor: grab; }
    #root.grabbing { cursor: grabbing; }
    #hud { pointer-events: none; }
    #msg { position: fixed; top: 12px; left: 12px; color: #fff; background: #0008; padding: 8px 12px; border-radius: 8px; pointer-events: none; z-index: 5; max-width: min(92vw, 900px); }
  </style>
</head>
<body>
  <div id="wrap">
    <video id="vid" autoplay playsinline muted></video>
    <div id="root"></div>
    <canvas id="hud"></canvas>
  </div>
  <div id="msg">Ouvre grand &amp; longtemps = grosse créature · 🌿 herbivores broutent les plantes · 🦈 prédateurs mangent les plus petits · attrape-les, nourris-les, laisse-les se reproduire 💞</div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
