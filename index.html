<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Aquarium de la bouche</title>
<style>
  body { margin: 0; background: #02141f; overflow: hidden; font-family: sans-serif; touch-action: none; }
  #wrap { position: fixed; inset: 0; }
  video, #cv { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  video { transform: scaleX(-1); opacity: .28; }
  #cv { cursor: grab; }
  #cv.grabbing { cursor: grabbing; }
  #msg { position: fixed; top: 12px; left: 12px; color: #fff; background: #0008; padding: 8px 12px; border-radius: 8px; pointer-events: none; }
  #draw-btn { position: fixed; top: 12px; right: 12px; z-index: 5; border: 0; border-radius: 999px;
    padding: 10px 16px; font-size: 15px; font-weight: 600; cursor: pointer; color: #02141f;
    background: linear-gradient(135deg, #ffe16b, #ff8fb1); box-shadow: 0 4px 14px #0006; }

  #modal { position: fixed; inset: 0; z-index: 10; display: none; align-items: center; justify-content: center;
    background: #02141fcc; backdrop-filter: blur(3px); }
  #modal.on { display: flex; }
  #panel { background: #0c2433; padding: 18px; border-radius: 16px; box-shadow: 0 10px 40px #000a; }
  #panel h2 { margin: 0 0 4px; color: #fff; font-size: 17px; }
  #panel p { margin: 0 0 10px; color: #8fb6c9; font-size: 13px; }
  #pad { background: #fff; border-radius: 10px; touch-action: none; display: block; }
  .row { display: flex; gap: 8px; align-items: center; margin-top: 12px; flex-wrap: wrap; }
  .sw { width: 26px; height: 26px; border-radius: 50%; border: 2px solid #fff3; cursor: pointer; }
  .sw.sel { border-color: #fff; transform: scale(1.15); }
  .btn { border: 0; border-radius: 8px; padding: 9px 14px; font-weight: 600; cursor: pointer; }
  .btn.ghost { background: #1d3d4f; color: #cfe6f0; }
  .btn.go { background: linear-gradient(135deg, #6bffa1, #6bd0ff); color: #02141f; margin-left: auto; }
</style>

<div id="wrap">
  <video id="vid" autoplay playsinline muted></video>
  <canvas id="cv"></canvas>
</div>
<div id="msg">Ouvre la bouche pour libérer une créature… (attrape-les à la souris !)</div>
<button id="draw-btn">🎨 Dessine ton poisson</button>

<div id="modal">
  <div id="panel">
    <h2>Dessine ton poisson</h2>
    <p>Dessine-le tourné vers la droite ➜, puis lâche-le dans l'aquarium.</p>
    <canvas id="pad" width="360" height="240"></canvas>
    <div class="row" id="swatches"></div>
    <div class="row">
      <button class="btn ghost" id="erase">Gomme</button>
      <button class="btn ghost" id="clear">Effacer</button>
      <button class="btn ghost" id="cancel">Annuler</button>
      <button class="btn go" id="release">Lâcher dans l'aquarium 🐟</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
<script>
const vid = document.getElementById("vid");
const cv = document.getElementById("cv");
const ctx = cv.getContext("2d");
const msg = document.getElementById("msg");
const fish = [];
const MAX = 24; // ponytail: plafond simple, retire le plus vieux au-delà

function resize() { cv.width = innerWidth; cv.height = innerHeight; }
addEventListener("resize", resize); resize();

const rnd = (a, b) => a + Math.random() * (b - a);
const ri = (a, b) => Math.floor(rnd(a, b + 1));
const pick = a => a[Math.floor(Math.random() * a.length)];

// ===== création d'une créature (génome façon Spore quand auto) =====
// maturité 0 = bébé (petit, gros yeux, peu de pièces) → 1 = adulte (grand, complet)
function spawn(x, y, opts = {}) {
  const hue = rnd(0, 360);
  const img = opts.img || null;
  const size = opts.size ?? (img ? rnd(34, 46) : rnd(26, 52));
  const mat = opts.maturity ?? rnd(0.3, 0.85);
  fish.push({
    x, y, vx: rnd(-1, 1), vy: rnd(-1, 1),
    heading: rnd(0, Math.PI * 2),
    speed: rnd(1.1, 2.6) + (1 - mat) * 0.8,     // bébés plus frétillants
    size, angle: 0, mode: "swim",
    img, hue,
    body: `hsl(${hue} 80% 58%)`,
    belly: `hsl(${hue} 70% 82%)`,
    fin: `hsl(${(hue + 35) % 360} 85% 52%)`,
    mark: `hsl(${(hue + 170) % 360} 75% 65%)`,
    pattern: pick(["stripes", "spots", "plain", "plain"]),
    spots: Array.from({ length: 7 }, () => [rnd(-0.6, 0.7), rnd(-0.5, 0.5)]),
    // pièces procédurales pilotées par la maturité :
    eyes: mat > 0.62 ? 2 : 1,
    spikes: Math.round(mat * 5),
    horns: Math.round(mat * 2),
    bellyFins: Math.round(mat * 2),
    finStyle: mat > 0.5 ? "forked" : "fan",
    eyeR: 0.30 - mat * 0.13,                     // gros yeux quand bébé
    bodyH: 1 - mat * 0.32,                        // bébés tout ronds
    phase: rnd(0, 10), wiggle: rnd(0.9, 1.6) + (1 - mat) * 0.5,
    turn: 0, nextTurn: 0, scale: 0.1, blink: 0,
  });
  if (fish.length > MAX) fish.shift();
}

function bodyPath(s, h) {
  ctx.beginPath();
  ctx.moveTo(s, 0);
  ctx.quadraticCurveTo(s * 0.3, -s * 0.78 * h, -s * 0.78, -s * 0.18 - s * 0.0);
  ctx.quadraticCurveTo(-s * 1.02, 0, -s * 0.78, s * 0.18);
  ctx.quadraticCurveTo(s * 0.3, s * 0.78 * h, s, 0);
  ctx.closePath();
}

function drawFish(f, t) {
  const s = f.size;
  const facingLeft = Math.cos(f.angle) < 0;
  const wig = Math.sin(t * 0.006 * f.speed + f.phase) * f.wiggle;
  ctx.save();
  ctx.translate(f.x, f.y);
  ctx.rotate(f.angle);
  if (facingLeft) ctx.scale(1, -1);
  ctx.scale(f.scale, f.scale);

  if (f.img) {                       // poisson dessiné par l'utilisateur
    const iw = f.img.width, ih = f.img.height;
    const k = (s * 2.6) / Math.max(iw, ih);
    ctx.rotate(wig * 0.05);
    ctx.drawImage(f.img, -iw * k / 2, -ih * k / 2, iw * k, ih * k);
    ctx.restore();
    return;
  }

  const h = f.bodyH, hue = f.hue;
  const ty = wig * s * 0.45;
  // palette volumétrique (lumière haut-gauche)
  const cLight = `hsl(${hue} 92% 74%)`, cMid = `hsl(${hue} 82% 55%)`, cDark = `hsl(${hue} 72% 32%)`;
  const cLine = `hsl(${hue} 70% 22%)`;
  const finHue = (hue + 35) % 360;
  const fg = ctx.createLinearGradient(-s * 0.6, -s, -s * 1.8, s);
  fg.addColorStop(0, `hsl(${finHue} 88% 66%)`);
  fg.addColorStop(1, `hsl(${finHue} 82% 36%)`);
  const fin = (drawPath) => { ctx.fillStyle = fg; ctx.strokeStyle = cLine; ctx.lineWidth = s * 0.035; ctx.lineJoin = "round"; drawPath(); ctx.fill(); ctx.stroke(); };

  // --- queue (derrière le corps) ---
  fin(() => {
    ctx.beginPath();
    ctx.moveTo(-s * 0.75, 0);
    if (f.finStyle === "forked") {
      ctx.quadraticCurveTo(-s * 1.5, ty - s * 0.7, -s * 1.75, ty - s * 0.55);
      ctx.quadraticCurveTo(-s * 1.25, ty, -s * 1.75, ty + s * 0.55);
      ctx.quadraticCurveTo(-s * 1.5, ty + s * 0.7, -s * 0.75, 0);
    } else {
      ctx.quadraticCurveTo(-s * 1.4, ty - s * 0.85, -s * 1.7, ty - s * 0.2);
      ctx.quadraticCurveTo(-s * 1.85, ty, -s * 1.7, ty + s * 0.2);
      ctx.quadraticCurveTo(-s * 1.4, ty + s * 0.85, -s * 0.75, 0);
    }
  });

  // --- épines dorsales / nageoire dorsale ---
  for (let i = 0; i < f.spikes; i++) {
    const px = -s * 0.4 + (i / Math.max(1, f.spikes - 1)) * s * 0.8;
    const ph = s * (0.45 - Math.abs(px) / s * 0.25) * h;
    const top = -Math.sqrt(Math.max(0, 1 - (px / s) ** 2)) * s * 0.72 * h;
    fin(() => { ctx.beginPath(); ctx.moveTo(px - s * 0.08, top + s * 0.05); ctx.lineTo(px, top - ph); ctx.lineTo(px + s * 0.08, top + s * 0.05); ctx.closePath(); });
  }
  if (!f.spikes) fin(() => { ctx.beginPath(); ctx.moveTo(-s * 0.25, -s * 0.5 * h); ctx.quadraticCurveTo(-s * 0.1, -s * 1.05 * h, s * 0.45, -s * 0.42 * h); ctx.closePath(); });

  // --- corps : dégradé radial = volume 3D, ombre douce ---
  const bg = ctx.createRadialGradient(s * 0.0, -s * 0.35 * h, s * 0.05, s * 0.0, 0, s * 1.35);
  bg.addColorStop(0, cLight); bg.addColorStop(0.55, cMid); bg.addColorStop(1, cDark);
  ctx.save();
  ctx.shadowColor = "rgba(0,0,0,.4)"; ctx.shadowBlur = s * 0.5; ctx.shadowOffsetY = s * 0.14;
  ctx.fillStyle = bg; bodyPath(s, h); ctx.fill();
  ctx.restore();
  ctx.strokeStyle = cLine; ctx.lineWidth = s * 0.04; bodyPath(s, h); ctx.stroke();

  // --- tout ce qui vit SUR le corps, découpé dedans ---
  ctx.save(); bodyPath(s, h); ctx.clip();
  // ventre clair dégradé
  const blg = ctx.createLinearGradient(0, -s * 0.1, 0, s * 0.85);
  blg.addColorStop(0, "rgba(255,255,255,0)"); blg.addColorStop(1, `hsl(${hue} 70% 90%)`);
  ctx.fillStyle = blg; bodyPath(s, h); ctx.fill();
  // motifs
  if (f.pattern !== "plain") {
    ctx.fillStyle = `hsl(${(hue + 170) % 360} 70% 45% / .55)`;
    if (f.pattern === "stripes") {
      for (let i = -1; i <= 2; i++) { ctx.beginPath(); ctx.ellipse(s * (0.1 - i * 0.4), 0, s * 0.12, s, 0, 0, Math.PI * 2); ctx.fill(); }
    } else {
      for (const [sx, sy] of f.spots) { ctx.beginPath(); ctx.arc(s * sx, s * sy, s * 0.11, 0, Math.PI * 2); ctx.fill(); }
    }
  }
  // reflet spéculaire
  ctx.fillStyle = "rgba(255,255,255,.3)";
  ctx.beginPath(); ctx.ellipse(s * 0.18, -s * 0.34 * h, s * 0.5, s * 0.17, -0.35, 0, Math.PI * 2); ctx.fill();
  ctx.restore();

  // --- nageoire pectorale (devant le corps) + ventrales ---
  fin(() => { ctx.beginPath(); ctx.moveTo(s * 0.15, s * 0.1); ctx.quadraticCurveTo(-s * 0.1, s * 0.6 + ty * 0.3, s * 0.45, s * 0.35); ctx.closePath(); });
  for (let i = 0; i < f.bellyFins; i++) {
    const px = -s * 0.1 - i * s * 0.35;
    fin(() => { ctx.beginPath(); ctx.moveTo(px, s * 0.2 * h); ctx.quadraticCurveTo(px - s * 0.1, s * 0.65 * h + ty * 0.2, px + s * 0.2, s * 0.45 * h); ctx.closePath(); });
  }

  // --- cornes ---
  ctx.strokeStyle = `hsl(${finHue} 80% 48%)`; ctx.lineWidth = s * 0.08; ctx.lineCap = "round";
  for (let i = 0; i < f.horns; i++) {
    const hx = s * (0.45 - i * 0.22);
    ctx.beginPath(); ctx.moveTo(hx, -s * 0.45 * h); ctx.lineTo(hx + s * 0.05, -s * 0.8 * h); ctx.stroke();
  }

  // --- yeux (sphère brillante) ---
  const blinking = f.blink > 0;
  const drawEye = (ex, ey, r) => {
    const eg = ctx.createRadialGradient(ex - r * 0.3, ey - r * 0.3, r * 0.1, ex, ey, r);
    eg.addColorStop(0, "#fff"); eg.addColorStop(1, "#cfd8e0");
    ctx.fillStyle = eg; ctx.beginPath(); ctx.arc(ex, ey, r, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = cLine; ctx.lineWidth = r * 0.12; ctx.stroke();
    if (blinking) {
      ctx.strokeStyle = "#0a0a14"; ctx.lineWidth = r * 0.3;
      ctx.beginPath(); ctx.moveTo(ex - r, ey); ctx.lineTo(ex + r, ey); ctx.stroke();
    } else {
      ctx.fillStyle = "#0a0a14"; ctx.beginPath(); ctx.arc(ex + r * 0.15, ey, r * 0.5, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(ex + r * 0.32, ey - r * 0.32, r * 0.2, 0, Math.PI * 2); ctx.fill();
    }
  };
  if (f.eyes === 2) {
    ctx.strokeStyle = cMid; ctx.lineWidth = s * 0.09; ctx.lineCap = "round";
    for (const dx of [-0.1, 0.25]) {
      ctx.beginPath(); ctx.moveTo(s * (0.3 + dx), -s * 0.35 * h); ctx.lineTo(s * (0.32 + dx), -s * 0.78 * h); ctx.stroke();
      drawEye(s * (0.32 + dx), -s * 0.85 * h, s * f.eyeR * 0.8);
    }
  } else {
    drawEye(s * 0.55, -s * 0.2 * h, s * f.eyeR);
  }

  // --- sourire ---
  ctx.strokeStyle = "#0a0a14"; ctx.lineWidth = s * 0.05; ctx.lineCap = "round";
  ctx.beginPath(); ctx.arc(s * 0.78, -s * 0.02, s * 0.16, 0.2, 1.3); ctx.stroke();

  ctx.restore();
}

// ===== physique : nage / attrapé / lancé =====
function step(f, t) {
  if (f.scale < 1) f.scale = Math.min(1, f.scale + 0.04);
  f.blink = f.blink > 0 ? f.blink - 1 : (Math.random() < 0.004 ? 8 : 0);
  const m = f.size * 1.2;

  if (f.mode === "held") { f.angle = Math.atan2(f.vy, f.vx) || f.angle; return; }

  if (f.mode === "thrown") {
    f.x += f.vx; f.y += f.vy;
    f.vx *= 0.97; f.vy *= 0.97;                 // traînée
    if (f.x < m && f.vx < 0) { f.x = m; f.vx *= -0.6; }
    if (f.x > cv.width - m && f.vx > 0) { f.x = cv.width - m; f.vx *= -0.6; }
    if (f.y < m && f.vy < 0) { f.y = m; f.vy *= -0.6; }
    if (f.y > cv.height - m && f.vy > 0) { f.y = cv.height - m; f.vy *= -0.6; }
    if (Math.hypot(f.vx, f.vy) > 0.5) f.angle = Math.atan2(f.vy, f.vx);
    if (Math.hypot(f.vx, f.vy) < f.speed) { f.mode = "swim"; f.heading = f.angle; }
    return;
  }

  // nage : errance + lissage de vélocité
  if (t > f.nextTurn) { f.turn = rnd(-0.5, 0.5); f.nextTurn = t + rnd(400, 1400); }
  f.heading += f.turn * 0.01;
  const dx = Math.cos(f.heading) * f.speed, dy = Math.sin(f.heading) * f.speed;
  f.vx += (dx - f.vx) * 0.04; f.vy += (dy - f.vy) * 0.04;
  f.x += f.vx; f.y += f.vy;
  if (f.x < m) { f.x = m; f.heading = Math.PI - f.heading; }
  if (f.x > cv.width - m) { f.x = cv.width - m; f.heading = Math.PI - f.heading; }
  if (f.y < m) { f.y = m; f.heading = -f.heading; }
  if (f.y > cv.height - m) { f.y = cv.height - m; f.heading = -f.heading; }
  f.angle = Math.atan2(f.vy, f.vx);
}

// ===== feedback détection visages =====
let faces = [];
function drawFaces(t) {
  for (let i = 0; i < faces.length; i++) {
    const fc = faces[i];
    ctx.save();
    ctx.strokeStyle = fc.open ? "rgba(120,255,170,.55)" : "rgba(120,200,255,.3)";
    ctx.lineWidth = 2;
    ctx.beginPath();
    if (ctx.roundRect) ctx.roundRect(fc.x, fc.y, fc.w, fc.h, 16);
    else ctx.rect(fc.x, fc.y, fc.w, fc.h);
    ctx.stroke();
    ctx.fillStyle = fc.open ? "rgba(120,255,170,.9)" : "rgba(120,200,255,.7)";
    ctx.font = "13px sans-serif";
    ctx.fillText("Humain " + (i + 1), fc.x + 6, fc.y - 6);
    // œuf en croissance dans la bouche
    if (fc.egg) {
      const r = fc.egg.r * (1 + Math.sin(t * 0.012) * 0.06);
      ctx.fillStyle = "rgba(255,255,255,.22)";
      ctx.beginPath(); ctx.arc(fc.egg.x, fc.egg.y, r, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = "rgba(255,240,180,.85)"; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(fc.egg.x, fc.egg.y, r, 0, Math.PI * 2); ctx.stroke();
    }
    ctx.restore();
  }
}

function loop(t) {
  ctx.clearRect(0, 0, cv.width, cv.height);
  drawFaces(t);
  for (const f of fish) { step(f, t); drawFish(f, t); }
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// ===== attraper / déplacer / lancer =====
let grabbed = null;
cv.addEventListener("pointerdown", e => {
  let best = null, bd = 1e9;
  for (const f of fish) {
    const d = Math.hypot(f.x - e.clientX, f.y - e.clientY);
    if (d < f.size * 1.5 && d < bd) { bd = d; best = f; }
  }
  if (best) { grabbed = best; best.mode = "held"; best.vx = best.vy = 0; cv.classList.add("grabbing"); }
});
cv.addEventListener("pointermove", e => {
  if (!grabbed) return;
  grabbed.x = e.clientX; grabbed.y = e.clientY;
  grabbed.vx = e.movementX; grabbed.vy = e.movementY;   // vitesse réelle du pointeur
});
function drop() {
  if (!grabbed) return;
  const cap = 55;
  grabbed.vx = Math.max(-cap, Math.min(cap, grabbed.vx));
  grabbed.vy = Math.max(-cap, Math.min(cap, grabbed.vy));
  grabbed.mode = "thrown";
  grabbed = null; cv.classList.remove("grabbing");
}
cv.addEventListener("pointerup", drop);
cv.addEventListener("pointercancel", drop);

// ===== modal : dessine ton poisson =====
const modal = document.getElementById("modal");
const pad = document.getElementById("pad");
const pctx = pad.getContext("2d");
let penColor = "#ff5d73", erasing = false, painting = false;
const COLORS = ["#ff5d73", "#ffd23f", "#3fd07a", "#3fb6ff", "#b15dff", "#ff8f3f", "#222"];
const sw = document.getElementById("swatches");
COLORS.forEach((c, i) => {
  const d = document.createElement("div");
  d.className = "sw" + (i === 0 ? " sel" : ""); d.style.background = c;
  d.onclick = () => { penColor = c; erasing = false; [...sw.children].forEach(x => x.classList.remove("sel")); d.classList.add("sel"); };
  sw.appendChild(d);
});
function padPos(e) { const r = pad.getBoundingClientRect(); return [e.clientX - r.left, e.clientY - r.top]; }
pad.addEventListener("pointerdown", e => { painting = true; pctx.beginPath(); pctx.moveTo(...padPos(e)); });
pad.addEventListener("pointermove", e => {
  if (!painting) return;
  pctx.lineCap = pctx.lineJoin = "round";
  pctx.lineWidth = erasing ? 22 : 7;
  pctx.globalCompositeOperation = erasing ? "destination-out" : "source-over";
  pctx.strokeStyle = penColor;
  pctx.lineTo(...padPos(e)); pctx.stroke();
});
addEventListener("pointerup", () => painting = false);
document.getElementById("erase").onclick = () => erasing = true;
document.getElementById("clear").onclick = () => pctx.clearRect(0, 0, pad.width, pad.height);
document.getElementById("draw-btn").onclick = () => { modal.classList.add("on"); };
document.getElementById("cancel").onclick = () => modal.classList.remove("on");
document.getElementById("release").onclick = () => {
  const img = new Image();
  img.onload = () => spawn(rnd(cv.width * .3, cv.width * .7), rnd(cv.height * .3, cv.height * .7), img);
  img.src = pad.toDataURL();
  pctx.clearRect(0, 0, pad.width, pad.height);
  modal.classList.remove("on");
};

// ===== détection bouche (2 visages) + couvaison =====
// bouche ouverte = un œuf grossit (vite si grande ouverture) ; fermeture = éclosion.
const wasOpen = [];
const egg = [];      // {x,y,growth} par visage tant que la bouche est ouverte
const GROW = 6, MAXR = 78;
const mesh = new FaceMesh({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}` });
mesh.setOptions({ maxNumFaces: 2, refineLandmarks: false, minDetectionConfidence: .5, minTrackingConfidence: .5 });
mesh.onResults(r => {
 try {
  const list = r.multiFaceLandmarks || [];
  msg.style.display = list.length ? "none" : "block";
  faces = list.map((lm, i) => {
    let minX = 1, maxX = 0, minY = 1, maxY = 0;
    for (const p of lm) {
      const sx = 1 - p.x;                       // miroir comme la vidéo
      if (sx < minX) minX = sx; if (sx > maxX) maxX = sx;
      if (p.y < minY) minY = p.y; if (p.y > maxY) maxY = p.y;
    }
    const a = lm[13], b = lm[14], top = lm[10], bot = lm[152];
    if (!a || !b || !top || !bot) { return { x: minX * cv.width, y: minY * cv.height, w: (maxX - minX) * cv.width, h: (maxY - minY) * cv.height, open: false, egg: null }; }
    const ratio = Math.abs(a.y - b.y) / Math.abs(top.y - bot.y);
    const isOpen = ratio > 0.12;
    const mx = (1 - (a.x + b.x) / 2) * cv.width;
    const my = (a.y + b.y) / 2 * cv.height;

    if (isOpen) {
      if (!egg[i]) egg[i] = { x: mx, y: my, growth: 0 };
      egg[i].growth += ratio;                   // plus la bouche est grande, plus ça grossit vite
      egg[i].x = mx; egg[i].y = my;
    } else if (wasOpen[i] && egg[i]) {          // éclosion
      const size = Math.max(16, Math.min(MAXR, 16 + egg[i].growth * GROW));
      spawn(egg[i].x, egg[i].y, { size, maturity: (size - 16) / (MAXR - 16) });
      egg[i] = null;
    }
    wasOpen[i] = isOpen;

    const er = egg[i] ? Math.min(MAXR, 16 + egg[i].growth * GROW) : 0;
    return {
      x: minX * cv.width, y: minY * cv.height,
      w: (maxX - minX) * cv.width, h: (maxY - minY) * cv.height,
      open: isOpen,
      egg: egg[i] ? { x: egg[i].x, y: egg[i].y, r: er } : null,
    };
  });
  wasOpen.length = egg.length = list.length;
 } catch (e) { console.warn("onResults", e); }
});

(async () => {
  const cam = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
  vid.srcObject = cam;
  await vid.play();
  // .catch garde la boucle vivante même si une frame échoue
  (function pump() { mesh.send({ image: vid }).catch(() => {}).then(() => requestAnimationFrame(pump)); })();
})();
</script>
