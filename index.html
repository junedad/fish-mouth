<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Aquarium 3D de la bouche</title>
<style>
  body { margin: 0; background: #02141f; overflow: hidden; font-family: sans-serif; touch-action: none; }
  #wrap { position: fixed; inset: 0; }
  #vid, #three, #hud { position: absolute; inset: 0; width: 100%; height: 100%; }
  #vid { object-fit: cover; transform: scaleX(-1); opacity: .25; }
  #three { cursor: grab; }
  #three.grabbing { cursor: grabbing; }
  #hud { pointer-events: none; }
  #msg { position: fixed; top: 12px; left: 12px; color: #fff; background: #0008; padding: 8px 12px; border-radius: 8px; pointer-events: none; z-index: 5; }
</style>

<div id="wrap">
  <video id="vid" autoplay playsinline muted></video>
  <canvas id="three"></canvas>
  <canvas id="hud"></canvas>
</div>
<div id="msg">Ouvre grand & longtemps = grosse créature · 🌿 herbivores broutent les plantes · 🦈 prédateurs mangent les plus petits · attrape-les, nourris-les, laisse-les se reproduire 💞</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
<script type="module">
import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";

const vid = document.getElementById("vid");
const hud = document.getElementById("hud");
const hctx = hud.getContext("2d");
const msg = document.getElementById("msg");
const MAX = 22;

const rnd = (a, b) => a + Math.random() * (b - a);
const ri = (a, b) => Math.floor(rnd(a, b + 1));
const pick = a => a[Math.floor(Math.random() * a.length)];
const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
const blendHue = (a, b) => { const d = ((b - a + 540) % 360) - 180; return (a + d * rnd(0.35, 0.65) + rnd(-12, 12) + 360) % 360; };
const blend = (a, b, m) => a + (b - a) * rnd(0.35, 0.65) + rnd(-m, m);

// ===================== Three.js : scène / caméra / lumières =====================
const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById("three"), alpha: true, antialias: true });
renderer.setPixelRatio(Math.min(2, devicePixelRatio));
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.15;
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x02141f, 70, 150); // profondeur
const camera = new THREE.PerspectiveCamera(50, 1, 0.1, 400);
camera.position.set(0, 0, 72);

scene.add(new THREE.HemisphereLight(0x9cc6ff, 0x132028, 0.9)); // ciel/fond
scene.add(new THREE.AmbientLight(0x556677, 0.4));
const key = new THREE.DirectionalLight(0xffffff, 1.1); key.position.set(-30, 55, 50); scene.add(key);
const rim = new THREE.DirectionalLight(0x66ccff, 0.6); rim.position.set(40, -20, -30); scene.add(rim);

let bounds = new THREE.Vector3();
let bubbles, bgeo; const BN = 130;
function resize() {
  const w = innerWidth || 1, h = innerHeight || 1; // évite aspect Infinity/NaN si layout pas prêt
  renderer.setSize(w, h); hud.width = w; hud.height = h;
  camera.aspect = w / h; camera.updateProjectionMatrix();
  const halfH = Math.tan(camera.fov * Math.PI / 360) * camera.position.z;
  bounds.set(halfH * camera.aspect * 0.86, halfH * 0.86, 22); // demi-volume nageable
}
addEventListener("resize", resize); resize();

// bulles qui montent
bgeo = new THREE.BufferGeometry();
const bpos = new Float32Array(BN * 3);
for (let i = 0; i < BN; i++) { bpos[i * 3] = rnd(-bounds.x, bounds.x); bpos[i * 3 + 1] = rnd(-bounds.y, bounds.y); bpos[i * 3 + 2] = rnd(-bounds.z, bounds.z); }
bgeo.setAttribute("position", new THREE.BufferAttribute(bpos, 3));
bubbles = new THREE.Points(bgeo, new THREE.PointsMaterial({ color: 0xbfe6ff, size: 0.5, transparent: true, opacity: 0.45, depthWrite: false }));
scene.add(bubbles);

// projette un point écran (px) sur le plan z=0 du monde
function screenToWorld(px, py) {
  const v = new THREE.Vector3((px / innerWidth) * 2 - 1, -(py / innerHeight) * 2 + 1, 0.5).unproject(camera);
  const dir = v.sub(camera.position).normalize();
  return camera.position.clone().add(dir.multiplyScalar(-camera.position.z / dir.z));
}
const toScreen = v => { const p = v.clone().project(camera); return [(p.x * 0.5 + 0.5) * innerWidth, (-p.y * 0.5 + 0.5) * innerHeight]; };

// ===================== génome (héritable) =====================
// nested {type,size} pour chaque partie → système de pièces modulaire façon Spore
function randomGenome(baseHue, diet) {
  diet = diet || (Math.random() < 0.62 ? "herbivore" : "predator"); // plus de proies que de prédateurs
  const pred = diet === "predator";
  const hue = baseHue == null ? rnd(0, 360) : (baseHue + rnd(-22, 22) + 360) % 360;
  return {
    diet, hue, finHue: (hue + ri(20, 80)) % 360, markHue: (hue + ri(140, 200)) % 360,
    bodyShape: pred ? pick(["arrow", "long", "teardrop"]) : pick(["round", "flat", "normal", "teardrop"]),
    bodyH: pred ? rnd(0.68, 0.95) : rnd(0.92, 1.2),
    bodyLen: pred ? rnd(1.0, 1.3) : rnd(0.85, 1.05),
    tail: { type: pred ? pick(["forked", "lunate", "pointy"]) : pick(["fan", "round", "forked"]), size: rnd(0.85, 1.35) },
    dorsal: { type: pick(pred ? ["spikes", "crest", "none"] : ["sail", "crest", "none"]), size: rnd(0.8, 1.5), n: ri(3, 6) },
    pectoral: rnd(0.85, 1.25),
    eyes: { count: Math.random() < 0.35 ? 2 : 1, size: rnd(0.18, 0.32) * (pred ? 0.85 : 1.1), stalk: Math.random() < 0.3 },
    snout: pred ? "jaws" : pick(["none", "none", "beak", "whiskers"]),
    horns: pred ? ri(0, 1) : ri(0, 2), bellyFins: ri(0, 2),
    pattern: pick(["stripes", "spots", "plain", "reticulated"]), spotN: ri(5, 12),
  };
}
function crossover(A, B) {
  const g = {};
  // pièces entières héritées d'un parent (modularité)
  for (const k of ["bodyShape", "tail", "dorsal", "eyes", "pattern", "diet"]) g[k] = Math.random() < 0.5 ? A[k] : B[k];
  for (const k of ["horns", "bellyFins", "spotN"]) g[k] = Math.max(0, (Math.random() < 0.5 ? A[k] : B[k]) + (Math.random() < 0.18 ? ri(-1, 1) : 0));
  g.hue = blendHue(A.hue, B.hue);
  g.finHue = (g.hue + ri(20, 80)) % 360; g.markHue = (g.hue + ri(140, 200)) % 360;
  g.bodyH = clamp(blend(A.bodyH, B.bodyH, 0.05), 0.65, 1.2);
  g.bodyLen = clamp(blend(A.bodyLen, B.bodyLen, 0.05), 0.8, 1.35);
  g.pectoral = clamp(blend(A.pectoral, B.pectoral, 0.05), 0.8, 1.3);
  g.snout = g.diet === "predator" ? "jaws" : (A.snout === "jaws" ? "none" : pick([A.snout, B.snout]));
  return g;
}

// ===================== système de pièces modulaire (style Spore) =====================
const SH = { // proportions du corps : demi-longueur z, largeur x, hauteur y
  normal:   { len: 1.45, hx: 0.72, hy: 0.88 },
  long:     { len: 2.30, hx: 0.42, hy: 0.50 },
  round:    { len: 1.10, hx: 1.00, hy: 1.05 },
  flat:     { len: 1.25, hx: 0.40, hy: 1.30 },
  teardrop: { len: 1.55, hx: 0.74, hy: 0.80 },
  arrow:    { len: 1.85, hx: 0.52, hy: 0.62 }, // prédateur fuselé
};
const TAIL = { forked: [1.5, 1.5], fan: [1.95, 1.5], round: [1.5, 1.45], pointy: [1.5, 0.95], lunate: [2.25, 1.8], whip: [2.7, 0.55] };
const SPHERE = new THREE.SphereGeometry(1, 24, 18);

function finGeo(w, h) {
  const s = new THREE.Shape();
  s.moveTo(0, -h * 0.28);
  s.quadraticCurveTo(w * 0.6, -h * 0.55, w, -h * 0.12);
  s.quadraticCurveTo(w * 0.82, 0, w, h * 0.12);
  s.quadraticCurveTo(w * 0.6, h * 0.55, 0, h * 0.28);
  s.lineTo(0, -h * 0.28);
  return new THREE.ShapeGeometry(s);
}
function bodyTexture(g) {
  const c = document.createElement("canvas"); c.width = 128; c.height = 64;
  const x = c.getContext("2d");
  x.fillStyle = `hsl(${g.hue} 72% 52%)`; x.fillRect(0, 0, 128, 64);
  const grad = x.createLinearGradient(0, 0, 0, 64); // contre-ombrage ventre
  grad.addColorStop(0, `hsl(${g.hue} 75% 40%)`); grad.addColorStop(1, `hsl(${g.hue} 65% 82%)`);
  x.fillStyle = grad; x.globalAlpha = 0.55; x.fillRect(0, 0, 128, 64); x.globalAlpha = 1;
  x.fillStyle = `hsl(${g.markHue} 70% 50%)`; x.strokeStyle = `hsl(${g.markHue} 70% 45%)`;
  if (g.pattern === "stripes") { for (let i = 0; i < 7; i++) x.fillRect(8 + i * 18, 0, 7, 64); }
  else if (g.pattern === "spots") { for (let i = 0; i < g.spotN; i++) { x.beginPath(); x.arc(rnd(0, 128), rnd(0, 64), rnd(3, 6), 0, 7); x.fill(); } }
  else if (g.pattern === "reticulated") { x.lineWidth = 2; for (let i = -64; i < 128; i += 14) { x.beginPath(); x.moveTo(i, 0); x.lineTo(i + 64, 64); x.stroke(); x.beginPath(); x.moveTo(i + 64, 0); x.lineTo(i, 64); x.stroke(); } }
  const tex = new THREE.CanvasTexture(c); tex.colorSpace = THREE.SRGBColorSpace; return tex;
}

// — pièces : chaque fonction ajoute son mesh au groupe (facile à étendre) —
function partTail(group, g, D, M, anim) {
  const [tw, th] = TAIL[g.tail.type] || TAIL.forked, sz = g.tail.size;
  const pivot = new THREE.Group(); pivot.position.set(0, 0, -D.dz * 0.95); group.add(pivot);
  const tail = new THREE.Mesh(finGeo(D.S * tw * sz, D.S * th * sz), M.fin); tail.rotation.y = Math.PI / 2; pivot.add(tail);
  anim.tailPivot = pivot;
}
function partDorsal(group, g, D, M) {
  const t = g.dorsal.type, sz = g.dorsal.size;
  if (t === "sail") { const d = new THREE.Mesh(finGeo(D.dz * 1.1, D.dy * 1.4 * sz), M.fin); d.rotation.y = -Math.PI / 2; d.position.set(0, D.dy * 0.8, -D.dz * 0.05); group.add(d); }
  else if (t === "crest") { const d = new THREE.Mesh(finGeo(D.dz * 1.5, D.dy * 0.5 * sz), M.fin); d.rotation.y = -Math.PI / 2; d.position.set(0, D.dy * 0.85, -D.dz * 0.1); group.add(d); }
  else if (t === "spikes") {
    for (let i = 0; i < g.dorsal.n; i++) {
      const z = -D.dz * 0.35 + (i / Math.max(1, g.dorsal.n - 1)) * D.dz * 0.75;
      const yTop = D.dy * Math.sqrt(Math.max(0, 1 - (z / D.dz) ** 2));
      const sp = new THREE.Mesh(new THREE.ConeGeometry(D.S * 0.12, D.S * 0.6 * sz, 6), M.horn);
      sp.position.set(0, yTop * 0.95, z); group.add(sp);
    }
  }
}
function partPectorals(group, g, D, M, anim) {
  for (const side of [1, -1]) {
    const p = new THREE.Mesh(finGeo(D.S * 1.1 * g.pectoral, D.S * 0.7 * g.pectoral), M.fin);
    p.rotation.x = Math.PI / 2; p.rotation.y = side * 0.5;
    p.position.set(side * D.dx * 0.85, -D.dy * 0.1, D.dz * 0.25); p.scale.x = side;
    group.add(p); anim.pecs.push({ m: p, base: p.rotation.z, side });
  }
}
function partBellyFins(group, g, D, M) {
  for (let i = 0; i < g.bellyFins; i++) for (const side of [1, -1]) {
    const p = new THREE.Mesh(finGeo(D.S * 0.7, D.S * 0.5), M.fin);
    p.rotation.x = Math.PI / 2; p.position.set(side * D.dx * 0.5, -D.dy * 0.85, -D.dz * 0.1 - i * D.dz * 0.3); p.scale.x = side; group.add(p);
  }
}
function partSnout(group, g, D, M, anim) {
  const { S, dx, dy, dz } = D;
  if (g.snout === "jaws") { // gueule de prédateur avec dents
    const jaw = new THREE.Group(); jaw.position.set(0, -dy * 0.15, dz * 0.8); group.add(jaw);
    const low = new THREE.Mesh(new THREE.ConeGeometry(S * 0.4, S * 0.8, 8), M.horn); low.rotation.x = Math.PI / 2; low.position.set(0, -dy * 0.05, S * 0.25); jaw.add(low);
    for (let i = 0; i < 6; i++) { const tooth = new THREE.Mesh(new THREE.ConeGeometry(S * 0.06, S * 0.22, 5), M.white); tooth.rotation.x = Math.PI / 2; tooth.position.set((-0.3 + i * 0.12) * S * 2, dy * 0.02, S * 0.45); jaw.add(tooth); }
    anim.jaw = jaw;
  } else if (g.snout === "beak") {
    const bk = new THREE.Mesh(new THREE.ConeGeometry(S * 0.32, S * 0.7, 8), M.horn); bk.rotation.x = Math.PI / 2; bk.position.set(0, -dy * 0.1, dz * 1.05); group.add(bk);
  } else if (g.snout === "whiskers") {
    for (const side of [1, -1]) { const wk = new THREE.Mesh(new THREE.CylinderGeometry(S * 0.03, S * 0.03, S * 1.1, 5), M.horn); wk.position.set(side * dx * 0.4, -dy * 0.3, dz * 0.9); wk.rotation.set(0.5, 0, side * 0.5); group.add(wk); }
  }
}
function partHorns(group, g, D, M) {
  for (let i = 0; i < g.horns; i++) {
    const z = D.dz * (0.4 - i * 0.25), yTop = D.dy * Math.sqrt(Math.max(0, 1 - (z / D.dz) ** 2));
    const hn = new THREE.Mesh(new THREE.ConeGeometry(D.S * 0.13, D.S * 0.7, 6), M.horn); hn.position.set(0, yTop * 0.95, z); hn.rotation.x = -0.4; group.add(hn);
  }
}
function partEyes(group, g, D, M) {
  const er = D.S * g.eyes.size;
  const mkEye = (x, y, z) => {
    const e = new THREE.Group();
    e.add(new THREE.Mesh(new THREE.SphereGeometry(er, 14, 14), M.white));
    const pup = new THREE.Mesh(new THREE.SphereGeometry(er * 0.5, 10, 10), M.dark); pup.position.set(0, 0, er * 0.7); e.add(pup);
    e.position.set(x, y, z); group.add(e);
  };
  if (g.eyes.stalk || g.eyes.count === 2) for (const side of [1, -1]) {
    const sx = side * D.dx * 0.45;
    const stalk = new THREE.Mesh(new THREE.CylinderGeometry(er * 0.3, er * 0.3, D.dy * 0.9, 6), M.body); stalk.position.set(sx, D.dy * 0.9, D.dz * 0.3); group.add(stalk);
    mkEye(sx, D.dy * 1.35, D.dz * 0.3);
  } else for (const side of [1, -1]) mkEye(side * D.dx * 0.7, D.dy * 0.32, D.dz * 0.55);
}

function buildCreature(g, S) {
  const sh = SH[g.bodyShape] || SH.normal;
  const D = { S, dx: S * sh.hx, dy: S * sh.hy * g.bodyH, dz: S * sh.len * (g.bodyLen || 1) };
  const group = new THREE.Group();
  const M = {
    body: new THREE.MeshStandardMaterial({ map: bodyTexture(g), roughness: 0.5, metalness: 0.08 }),
    fin: new THREE.MeshStandardMaterial({ color: new THREE.Color(`hsl(${g.finHue}, 80%, 56%)`), roughness: 0.45, side: THREE.DoubleSide }),
    horn: new THREE.MeshStandardMaterial({ color: new THREE.Color(`hsl(${g.finHue}, 80%, 44%)`), roughness: 0.5 }),
    white: new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.25 }),
    dark: new THREE.MeshStandardMaterial({ color: 0x0a0a14, roughness: 0.3 }),
  };
  const mats = Object.values(M);
  const anim = { tailPivot: null, pecs: [], jaw: null };

  const body = new THREE.Mesh(SPHERE, M.body); body.scale.set(D.dx, D.dy, D.dz); group.add(body);
  partTail(group, g, D, M, anim);
  partDorsal(group, g, D, M);
  partPectorals(group, g, D, M, anim);
  partBellyFins(group, g, D, M);
  partSnout(group, g, D, M, anim);
  partHorns(group, g, D, M);
  partEyes(group, g, D, M);

  return { group, mats, tailPivot: anim.tailPivot, pecs: anim.pecs, jaw: anim.jaw, dz: D.dz };
}

// ===================== plantes (nourriture des herbivores) =====================
const plants = [];
function buildPlant(x, z) {
  const group = new THREE.Group(); const blades = [];
  const n = ri(4, 7);
  for (let i = 0; i < n; i++) {
    const h = rnd(9, 18), w = rnd(1.4, 2.6);
    const s = new THREE.Shape(); s.moveTo(-w / 2, 0); s.quadraticCurveTo(-w * 0.2, h * 0.6, 0, h); s.quadraticCurveTo(w * 0.2, h * 0.6, w / 2, 0);
    const m = new THREE.Mesh(new THREE.ShapeGeometry(s), new THREE.MeshStandardMaterial({ color: new THREE.Color().setHSL(rnd(0.28, 0.42), 0.6, rnd(0.32, 0.48)), roughness: 0.7, side: THREE.DoubleSide }));
    m.position.set(rnd(-3, 3), 0, rnd(-3, 3)); m.rotation.y = rnd(0, 6.28);
    group.add(m); blades.push({ m, base: m.rotation.z, ph: rnd(0, 6) });
  }
  group.position.set(x, -bounds.y, z); scene.add(group);
  plants.push({ group, blades, health: 1 });
}
for (let i = 0; i < 5; i++) buildPlant(rnd(-bounds.x * 0.8, bounds.x * 0.8), rnd(-bounds.z * 0.6, bounds.z * 0.6));

// ===================== créatures : naissance / physique / vie =====================
const creatures = [];
const hearts = [];
const pellets = [];
const PELLET_GEO = new THREE.SphereGeometry(0.5, 8, 8);
const PELLET_MAT = new THREE.MeshStandardMaterial({ color: 0xffd23f, emissive: 0x553300, roughness: 0.4 });
function dropFood(e) {
  const m = new THREE.Mesh(PELLET_GEO, PELLET_MAT);
  m.position.copy(screenToWorld(e.clientX, e.clientY)); scene.add(m);
  pellets.push({ mesh: m, vy: -2, eaten: false });
}
// "longueur efficace" = taille réelle (croissance + prédateurs grossis en mangeant)
const effLen = o => o.S * o.dz * (o.fullScale || 1) * clamp(o.grow, 0.05, 1);

function spawnAt(pos, opts = {}) {
  const g = opts.genome || randomGenome();
  const px = opts.size ?? rnd(26, 52);
  const S = px * 0.05;
  const baby = !!opts.baby;
  const built = buildCreature(g, S);
  built.group.position.copy(pos);
  built.group.scale.setScalar(baby ? 0.14 : 0.2);
  scene.add(built.group);
  creatures.push({
    ...built, g, S, baby, fullScale: 1, dead: false, hunting: false, hunger: rnd(0, 0.4),
    grow: baby ? 0.14 : 0.2,
    vel: new THREE.Vector3(rnd(-4, 4), rnd(-4, 4), rnd(-2, 2)),
    wander: new THREE.Vector3(rnd(-1, 1), rnd(-1, 1), rnd(-1, 1)).normalize(),
    nextTurn: 0, speed: (g.diet === "predator" ? rnd(8, 12) : rnd(7, 13)) + (baby ? 4 : 0),
    mode: "swim", age: 0, life: rnd(48, 95), mateCd: baby ? 11 : 3.5,
    phase: rnd(0, 10), wig: rnd(0.9, 1.6), alpha: 1,
  });
  if (creatures.length > MAX) { const o = creatures.shift(); scene.remove(o.group); }
}

const tmp = new THREE.Vector3(), tmp2 = new THREE.Vector3();
function stepCreature(c, t, dt) {
  c.grow += (1 - c.grow) * (c.baby ? 0.4 : 2.5) * dt;
  c.group.scale.setScalar(clamp(c.grow, 0.05, 1) * c.fullScale * (c.mode === "held" ? 1.15 : 1));
  c.age += dt; c.mateCd -= dt;
  const left = c.life - c.age;
  c.alpha = left < 5 ? clamp(left / 5, 0, 1) : 1;
  if (c.alpha < 1) for (const m of c.mats) { m.transparent = true; m.opacity = c.alpha; }
  const old = left < 5, pred = c.g.diet === "predator", myLen = effLen(c);

  // animations
  c.tailPivot.rotation.y = Math.sin(t * 7 + c.phase) * 0.5 * c.wig;
  for (const p of c.pecs) p.m.rotation.z = p.base + Math.sin(t * 6 + c.phase) * 0.4 * p.side;
  if (c.jaw) c.jaw.rotation.x = THREE.MathUtils.lerp(c.jaw.rotation.x, c.hunting ? 0.5 : 0.05, dt * 8);

  const pos = c.group.position, b = bounds;
  if (c.mode === "held") return;

  if (c.mode === "thrown") {
    pos.addScaledVector(c.vel, dt); c.vel.multiplyScalar(Math.pow(0.12, dt));
  } else { // ===== nage : décisions selon régime + faim (besoin façon Sims) =====
    c.hunger = Math.min(1, c.hunger + dt * 0.05);
    let target = false, fleeing = false; c.hunting = false;

    // 1) proies : fuir un prédateur plus gros (réflexe, indépendant de la faim)
    if (!pred) {
      let pr = null, pd = 1e9;
      for (const o of creatures) { if (o === c || o.dead || o.g.diet !== "predator" || effLen(o) < myLen * 1.1) continue; const dd = pos.distanceToSquared(o.group.position); if (dd < pd) { pd = dd; pr = o; } }
      if (pr && pd < 36 * 36) { tmp.copy(pos).sub(pr.group.position).normalize(); c.wander.copy(tmp); target = fleeing = true; }
    }
    // 2) prédateur affamé : chasse un plus petit, mais ÉPARGNE les bébés (grow < 0.55)
    if (!target && pred && c.hunger > 0.5) {
      let prey = null, nd = 1e9;
      for (const o of creatures) { if (o === c || o.dead || o.grow < 0.55 || effLen(o) > myLen * 0.82) continue; const dd = pos.distanceToSquared(o.group.position); if (dd < nd) { nd = dd; prey = o; } }
      if (prey && nd < 46 * 46) {
        tmp.copy(prey.group.position).sub(pos); c.hunting = true; target = true;
        if (tmp.length() < myLen * 0.6 + effLen(prey) * 0.5 + 1) { prey.dead = true; c.hunger = 0; c.fullScale = Math.min(2.5, c.fullScale * 1.08); hearts.push({ pos: prey.group.position.clone(), age: 0, emoji: "💥" }); }
        else c.wander.copy(tmp).normalize();
      }
    }
    // 3) herbivore affamé : broute les plantes
    if (!target && !pred && c.hunger > 0.35 && plants.length) {
      let pl = null, nd = 1e9;
      for (const p of plants) { if (p.health < 0.2) continue; const dd = pos.distanceToSquared(p.group.position); if (dd < nd) { nd = dd; pl = p; } }
      if (pl && nd < 64 * 64) { tmp.copy(pl.group.position).sub(pos); target = true; if (tmp.length() < myLen * 0.6 + 7) { pl.health = Math.max(0, pl.health - dt * 0.5); c.hunger = Math.max(0, c.hunger - dt * 0.6); c.grow = Math.min(1, c.grow + dt * 0.06); } else c.wander.copy(tmp).normalize(); }
    }
    // 4) granulés (herbivores affamés)
    if (!target && !pred && c.hunger > 0.35 && pellets.length) {
      let near = null, nd = 1e9;
      for (const pl of pellets) { const dd = pos.distanceToSquared(pl.mesh.position); if (dd < nd) { nd = dd; near = pl; } }
      if (near && nd < 44 * 44) { tmp.copy(near.mesh.position).sub(pos); target = true; if (tmp.length() < myLen * 0.6 + 2) { near.eaten = true; c.hunger = Math.max(0, c.hunger - 0.5); c.grow = Math.min(1, c.grow + 0.04); } else c.wander.copy(tmp).normalize(); }
    }
    if (!target && t > c.nextTurn) { c.wander.set(rnd(-1, 1), rnd(-1, 1), rnd(-0.6, 0.6)).normalize(); c.nextTurn = t + rnd(1.2, 3.5); }

    const sp = c.speed * (old ? 1.7 : 1) * (fleeing ? 1.8 : c.hunting ? 1.45 : 1);
    tmp.copy(c.wander).multiplyScalar(sp);
    c.vel.lerp(tmp, clamp(dt * 1.5, 0, 1));
    // séparation
    for (const o of creatures) { if (o === c || o.dead) continue; tmp2.subVectors(pos, o.group.position); const rr = (myLen + effLen(o)) * 0.5, d2 = tmp2.lengthSq(); if (d2 > 1e-4 && d2 < rr * rr) c.vel.addScaledVector(tmp2.normalize(), (rr - Math.sqrt(d2)) * 4 * dt); }
    pos.addScaledVector(c.vel, dt);
  }

  for (const ax of ["x", "y", "z"]) {
    const lim = b[ax];
    if (pos[ax] > lim) { pos[ax] = lim; if (c.vel[ax] > 0) c.vel[ax] *= -0.7; c.wander[ax] *= -1; }
    if (pos[ax] < -lim) { pos[ax] = -lim; if (c.vel[ax] < 0) c.vel[ax] *= -0.7; c.wander[ax] *= -1; }
  }
  if (c.vel.lengthSq() > 0.5) { tmp.copy(pos).add(c.vel); c.group.lookAt(tmp); }
  if (c.mode === "thrown" && c.vel.length() < c.speed * 0.5) c.mode = "swim";
}

// reproduction : deux adultes (même régime) proches → bébé croisé
function fertile(c) { return !c.dead && c.mode === "swim" && c.grow > 0.96 && c.mateCd <= 0 && c.age < c.life - 8; }
function breeding() {
  if (creatures.length >= MAX) return;
  for (let i = 0; i < creatures.length; i++) {
    const a = creatures[i]; if (!fertile(a)) continue;
    for (let j = i + 1; j < creatures.length; j++) {
      const b = creatures[j]; if (!fertile(b) || b.g.diet !== a.g.diet) continue;
      const reach = (effLen(a) + effLen(b)) * 0.6 + 4;
      if (a.group.position.distanceTo(b.group.position) > reach) continue;
      const mid = a.group.position.clone().lerp(b.group.position, 0.5);
      spawnAt(mid, { genome: crossover(a.g, b.g), size: clamp((a.S + b.S) / 2 / 0.05 * rnd(0.85, 1.05), 18, 70), baby: true });
      a.mateCd = b.mateCd = 13;
      hearts.push({ pos: mid.clone(), age: 0 });
      return;
    }
  }
}

// ===================== HUD 2D : visages + œufs + cœurs =====================
let faces = [];
function drawHUD(t, dt) {
  hctx.clearRect(0, 0, hud.width, hud.height);
  for (const fc of faces) {
    const H = fc.hue;
    hctx.strokeStyle = `hsl(${H} 85% 60% / ${fc.open ? 0.85 : 0.4})`;
    hctx.lineWidth = fc.open ? 3 : 2; hctx.beginPath();
    if (hctx.roundRect) hctx.roundRect(fc.x, fc.y, fc.w, fc.h, 16); else hctx.rect(fc.x, fc.y, fc.w, fc.h);
    hctx.stroke();
    hctx.fillStyle = `hsl(${H} 85% 65%)`; hctx.font = "13px sans-serif";
    hctx.fillText("Humain " + fc.num, fc.x + 6, fc.y - 6);
    if (fc.egg) {
      const r = fc.egg.r * (1 + Math.sin(t * 12) * 0.06);
      hctx.fillStyle = `hsl(${H} 85% 70% / .28)`; hctx.beginPath(); hctx.arc(fc.egg.x, fc.egg.y, r, 0, 7); hctx.fill();
      hctx.strokeStyle = `hsl(${H} 90% 65%)`; hctx.lineWidth = 2; hctx.beginPath(); hctx.arc(fc.egg.x, fc.egg.y, r, 0, 7); hctx.stroke();
    }
  }
  for (let i = hearts.length - 1; i >= 0; i--) {
    const h = hearts[i]; h.age += dt; h.pos.y += dt * 3;
    if (h.age > 1.6) { hearts.splice(i, 1); continue; }
    const [sx, sy] = toScreen(h.pos);
    hctx.globalAlpha = 1 - h.age / 1.6; hctx.font = "28px sans-serif"; hctx.fillText(h.emoji || "💞", sx - 14, sy); hctx.globalAlpha = 1;
  }
  // légende population
  let herb = 0, pred = 0; for (const c of creatures) { if (c.g.diet === "predator") pred++; else herb++; }
  hctx.font = "15px sans-serif"; hctx.textAlign = "right";
  hctx.fillStyle = "#bfe6c0"; hctx.fillText("🌿 " + herb, hud.width - 60, 26);
  hctx.fillStyle = "#ffb0a0"; hctx.fillText("🦈 " + pred, hud.width - 14, 26);
  hctx.textAlign = "left";
}

// ===================== boucle =====================
const clock = new THREE.Clock();
function animate() {
  const dt = Math.min(0.05, clock.getDelta()), t = clock.getElapsedTime();
  for (let i = creatures.length - 1; i >= 0; i--) {
    const c = creatures[i]; stepCreature(c, t, dt);
    if (c.dead || c.age > c.life) { scene.remove(c.group); creatures.splice(i, 1); }
  }
  breeding();
  // plantes : repousse + balancement
  for (const p of plants) {
    p.health = Math.min(1, p.health + dt * 0.04);
    p.group.scale.set(1, 0.25 + 0.75 * p.health, 1);
    for (const bl of p.blades) bl.m.rotation.z = bl.base + Math.sin(t * 1.5 + bl.ph) * 0.15;
  }
  // bulles qui montent
  const a = bgeo.attributes.position.array;
  for (let i = 0; i < BN; i++) {
    a[i * 3 + 1] += dt * (2 + (i % 5)); a[i * 3] += Math.sin(t + i) * dt * 0.4;
    if (a[i * 3 + 1] > bounds.y) { a[i * 3 + 1] = -bounds.y; a[i * 3] = rnd(-bounds.x, bounds.x); }
  }
  bgeo.attributes.position.needsUpdate = true;
  // nourriture qui coule
  for (let i = pellets.length - 1; i >= 0; i--) {
    const pl = pellets[i]; pl.mesh.position.y += pl.vy * dt; pl.vy = Math.max(-6, pl.vy - dt * 2);
    if (pl.eaten || pl.mesh.position.y < -bounds.y) { scene.remove(pl.mesh); pellets.splice(i, 1); }
  }
  drawHUD(t, dt);
  renderer.render(scene, camera);
  requestAnimationFrame(animate);
}
animate();

// ===================== attraper / déplacer / lancer (3D) =====================
const raycaster = new THREE.Raycaster();
const dragPlane = new THREE.Plane();
const three = renderer.domElement;
let grabbed = null, lastDrag = new THREE.Vector3(), lastT = 0;
function ndc(e) { return new THREE.Vector2((e.clientX / innerWidth) * 2 - 1, -(e.clientY / innerHeight) * 2 + 1); }
function creatureOf(obj) { while (obj) { const c = creatures.find(c => c.group === obj); if (c) return c; obj = obj.parent; } return null; }

three.addEventListener("pointerdown", e => {
  raycaster.setFromCamera(ndc(e), camera);
  const hit = raycaster.intersectObjects(creatures.map(c => c.group), true)[0];
  if (!hit) { dropFood(e); return; }
  const c = creatureOf(hit.object); if (!c) return;
  grabbed = c; c.mode = "held"; c.vel.set(0, 0, 0); three.classList.add("grabbing");
  camera.getWorldDirection(dragPlane.normal); dragPlane.setFromNormalAndCoplanarPoint(dragPlane.normal, c.group.position);
  lastDrag.copy(c.group.position); lastT = clock.getElapsedTime();
});
three.addEventListener("pointermove", e => {
  if (!grabbed) return;
  raycaster.setFromCamera(ndc(e), camera);
  const p = new THREE.Vector3();
  if (!raycaster.ray.intersectPlane(dragPlane, p)) return;
  const now = clock.getElapsedTime(), d = Math.max(0.001, now - lastT);
  grabbed.vel.copy(p).sub(lastDrag).divideScalar(d).clampLength(0, 60);
  grabbed.group.position.copy(p); lastDrag.copy(p); lastT = now;
});
function drop() { if (grabbed) { grabbed.mode = "thrown"; grabbed = null; three.classList.remove("grabbing"); } }
three.addEventListener("pointerup", drop);
three.addEventListener("pointercancel", drop);

// ===================== détection bouche (≤4 visages, identité + couleur) =====================
const humans = []; let nextId = 0;
const PALETTE = [8, 45, 130, 200, 280, 330, 95, 250];
const GROW = 8, MAXR = 120, MATCH = 0.22, FORGET = 30;
const mesh = new FaceMesh({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}` });
mesh.setOptions({ maxNumFaces: 4, refineLandmarks: false, minDetectionConfidence: .5, minTrackingConfidence: .5 });
mesh.onResults(r => {
 try {
  const list = r.multiFaceLandmarks || [];
  msg.style.display = list.length ? "none" : "block";
  const dets = list.map(lm => {
    let minX = 1, maxX = 0, minY = 1, maxY = 0;
    for (const p of lm) { const sx = 1 - p.x; if (sx < minX) minX = sx; if (sx > maxX) maxX = sx; if (p.y < minY) minY = p.y; if (p.y > maxY) maxY = p.y; }
    const a = lm[13], b = lm[14], top = lm[10], bot = lm[152], valid = a && b && top && bot;
    const ratio = valid ? Math.abs(a.y - b.y) / Math.abs(top.y - bot.y) : 0;
    return { minX, maxX, minY, maxY, cx: (minX + maxX) / 2, cy: (minY + maxY) / 2, ratio, isOpen: valid && ratio > 0.12,
      mx: valid ? (1 - (a.x + b.x) / 2) * innerWidth : 0, my: valid ? (a.y + b.y) / 2 * innerHeight : 0 };
  });
  for (const h of humans) h.seen = false;
  for (const d of dets) {
    let best = null, bd = MATCH;
    for (const h of humans) { if (h.seen) continue; const dist = Math.hypot(h.cx - d.cx, h.cy - d.cy); if (dist < bd) { bd = dist; best = h; } }
    if (!best) { const id = nextId++; best = { id, hue: PALETTE[id % PALETTE.length], wasOpen: false, egg: null }; humans.push(best); }
    best.seen = true; best.miss = 0; best.cx = d.cx; best.cy = d.cy; d.h = best;
    // lissage temporel + hystérésis (ouvre >0.15, ferme <0.09) → pas de flicker
    best.sm = best.sm == null ? d.ratio : best.sm * 0.5 + d.ratio * 0.5;
    const open = best.wasOpen ? best.sm > 0.09 : best.sm > 0.15;
    d.open = open;
    if (open) { if (!best.egg) best.egg = { x: d.mx, y: d.my, growth: 0 }; best.egg.growth += d.ratio; best.egg.x = d.mx; best.egg.y = d.my; }
    else if (best.wasOpen && best.egg) {
      const size = clamp(16 + best.egg.growth * GROW, 16, MAXR);
      spawnAt(screenToWorld(best.egg.x, best.egg.y), { size, genome: randomGenome(best.hue) });
      best.egg = null;
    }
    best.wasOpen = open;
  }
  for (let i = humans.length - 1; i >= 0; i--) { if (humans[i].seen) continue; if ((humans[i].miss = (humans[i].miss || 0) + 1) > FORGET) humans.splice(i, 1); }
  faces = dets.map(d => {
    const er = d.h.egg ? Math.min(MAXR, 16 + d.h.egg.growth * GROW) : 0;
    return { x: d.minX * innerWidth, y: d.minY * innerHeight, w: (d.maxX - d.minX) * innerWidth, h: (d.maxY - d.minY) * innerHeight,
      open: d.open, hue: d.h.hue, num: humans.indexOf(d.h) + 1, egg: d.h.egg ? { x: d.h.egg.x, y: d.h.egg.y, r: er } : null };
  });
 } catch (e) { console.warn("onResults", e); }
});

(async () => {
  const cam = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
  vid.srcObject = cam; await vid.play();
  (function pump() { mesh.send({ image: vid }).catch(() => {}).then(() => requestAnimationFrame(pump)); })();
})();
</script>
